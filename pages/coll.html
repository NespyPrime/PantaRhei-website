<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <title>Featured Collection</title>

    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .featured-section {
            padding: 80px 0;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 20px;
        }

        .section-subtitle {
            color: #b7b7b7;
            max-width: 650px;
            margin: auto;
            font-size: 1.2rem;
        }

        .product-card {
            position: relative;
            overflow: hidden;
            background: #111;
            cursor: pointer;
        }

        .product-card img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .limited-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #c8a96b;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2;
        }

        .wishlist-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 22px;
            z-index: 2;
            transition: 0.3s;
        }

        .wishlist-btn:hover {
            background: #c8a96b;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #c8a96b;
            width: 65px;
            height: 65px;
            border: none;
            color: white;
            font-size: 28px;
        }

        @media (max-width: 768px) {
            .featured-section {
                padding: 60px 0;
            }

            .product-card img {
                height: 420px;
            }

            .section-subtitle {
                font-size: 1rem;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

<section class="featured-section">
    <div class="container">

        <!-- Heading -->
        <div class="text-center mb-5">
            <h1 class="section-title">
                Featured Collection
            </h1>

            <p class="section-subtitle">
                Discover our premium streetwear pieces designed for those who dare
                to stand out
            </p>
        </div>

        <!-- Product Grid -->
        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="product-card">

                    <span class="limited-badge">
                        LIMITED
                    </span>

                    <button class="wishlist-btn">
                        <i class="bi bi-heart"></i>
                    </button>

                    <img src="images/hoodie1.jpg" alt="hoodie">
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="product-card">

                    <button class="wishlist-btn">
                        <i class="bi bi-heart"></i>
                    </button>

                    <img src="images/hoodie2.jpg" alt="hoodie">
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-lg-4 col-md-6">
                <div class="product-card">

                    <button class="wishlist-btn">
                        <i class="bi bi-heart"></i>
                    </button>

                    <img src="images/hoodie3.jpg" alt="hoodie">
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Scroll to top button -->
<button class="scroll-top">
    <i class="bi bi-arrow-up"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
